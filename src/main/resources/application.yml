spring:
  datasource:
    url: jdbc:mysql://localhost:3306/crm_tuyensinh?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: 160603
    hikari:
      maximum-pool-size: 10      # phù hợp 4 core / 8GB RAM
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate          # KHÔNG dùng create/update — schema đã có sẵn
    show-sql: false               # bật true khi debug, tắt production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  batch:
    job:
      enabled: false              # tắt auto-run, chỉ trigger khi có file upload
    jdbc:
      initialize-schema: always   # tự tạo bảng metadata của Spring Batch

  servlet:
    multipart:
      max-file-size: 50MB         # cho phép upload CSV lớn
      max-request-size: 50MB

app:
  jwt:
    secret: your-secret-key-must-be-at-least-256-bits-long-for-hs256
    access-token-expiry: 900
    refresh-token-expiry: 604800

server:
  port: 8080

logging:
  level:
    com.yourcompany.crm: DEBUG
    org.springframework.batch: INFO